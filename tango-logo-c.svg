<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Warm paper background, ink aesthetic -->
  <rect width="400" height="400" rx="88" fill="#f9f4ee"/>
  
  <!-- Stack of cards (depth effect) -->
  <rect x="108" y="118" width="188" height="148" rx="14" fill="#e8e0d8" transform="rotate(-6 200 192)"/>
  <rect x="108" y="112" width="188" height="148" rx="14" fill="#d4c9be" transform="rotate(-3 200 186)"/>
  
  <!-- Front card -->
  <rect x="106" y="88" width="188" height="150" rx="14" fill="#ffffff"
    style="filter:drop-shadow(0 6px 20px rgba(0,0,0,0.12))"/>
  
  <!-- Red corner accent -->
  <circle cx="272" cy="106" r="10" fill="#e63946"/>
  
  <!-- 単 character in ink -->
  <text x="200" y="198" text-anchor="middle"
    font-family="'Noto Sans JP', serif"
    font-size="96" font-weight="700"
    fill="#111111">単</text>

  <!-- Thin red line on card -->  
  <rect x="140" y="218" width="120" height="3" rx="1.5" fill="#e63946" opacity="0.7"/>
  
  <!-- TANGO wordmark in dark ink -->
  <text x="200" y="308"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="800" letter-spacing="12"
    fill="#111111">TANGO</text>

  <!-- Subtitle -->
  <text x="200" y="336"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="11" letter-spacing="3.5"
    fill="#aaaaaa">JAPANESE · FLASHCARDS</text>
</svg>
